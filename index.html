<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>溜了 · 完美借口生成器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

  :root {
    --bg: #0a0818;
    --surface: rgba(20,16,40,0.6);
    --card: rgba(30,24,55,0.45);
    --card-hover: rgba(40,32,70,0.55);
    --border: rgba(120,100,180,0.25);
    --fg: #f0ece4;
    --muted: #9088b0;
    --accent: #e8a838;
    --accent-dim: rgba(232,168,56,0.12);
    --accent-glow: rgba(232,168,56,0.25);
    --sincere: #4a9e7d;
    --sincere-dim: rgba(74,158,125,0.12);
    --ridiculous: #d45d5d;
    --ridiculous-dim: rgba(212,93,93,0.12);
    --perfunctory: #7a7ab0;
    --perfunctory-dim: rgba(122,122,176,0.12);
    --high-eq: #38b2ac;
    --high-eq-dim: rgba(56,178,172,0.12);
    --radius: 12px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: #0a0818;
    color: var(--fg);
    min-height: 100dvh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 700px 500px at 15% 25%, rgba(138, 99, 210, 0.28) 0%, transparent 60%),
      radial-gradient(ellipse 600px 600px at 85% 75%, rgba(78, 150, 200, 0.22) 0%, transparent 60%),
      radial-gradient(ellipse 450px 400px at 70% 20%, rgba(232, 168, 56, 0.12) 0%, transparent 60%),
      radial-gradient(ellipse 400px 350px at 25% 80%, rgba(200, 100, 150, 0.18) 0%, transparent 60%),
      radial-gradient(ellipse 350px 300px at 50% 50%, rgba(120, 100, 180, 0.14) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: nebulaDrift 20s ease-in-out infinite alternate;
  }

  body::after {
    content: '';
    position: fixed;
    inset: -20%;
    background:
      linear-gradient(115deg,
        transparent 30%,
        rgba(138, 99, 210, 0.10) 42%,
        rgba(78, 150, 200, 0.14) 48%,
        rgba(232, 168, 56, 0.08) 52%,
        rgba(200, 100, 150, 0.12) 58%,
        transparent 70%);
    filter: blur(40px);
    pointer-events: none;
    z-index: 0;
    animation: galaxyFlow 25s ease-in-out infinite alternate;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 440px;
    margin: 0 auto;
    padding: 14px 20px 20px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 10px;
    animation: fadeDown 0.6s ease;
    position: relative;
    padding: 4px 0 2px;
  }

  .header .logo {
    font-size: 30px;
    font-weight: 900;
    letter-spacing: -2px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 8px;
    text-shadow: 0 0 40px rgba(232,168,56,0.3);
  }

  .header .sub {
    font-size: 11px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .share-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .share-btn:hover { border-color: var(--accent); color: var(--accent); }
  .share-btn:active { transform: scale(0.96); }
  .share-btn svg { flex-shrink: 0; }

  /* Version Toggle - top right tab style */
  .version-toggle {
    position: absolute;
    top: 4px;
    right: 0;
    display: flex;
    background: rgba(50,40,90,0.4);
    border: 1px solid rgba(140,120,200,0.2);
    border-radius: 20px;
    padding: 2px;
    max-width: calc(100% - 20px);
  }

  .version-btn {
    padding: 5px 10px;
    border-radius: 16px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.25s ease;
    white-space: nowrap;
  }
  .version-btn.active {
    background: linear-gradient(135deg, rgba(232,168,56,0.2), rgba(232,168,56,0.08));
    color: var(--accent);
  }
  .version-btn:active { transform: scale(0.95); }

  /* QR Modal */
  .qr-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .qr-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .qr-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    text-align: center;
    max-width: 300px;
    width: 90%;
    transform: scale(0.9);
    transition: transform 0.25s ease;
  }
  .qr-overlay.show .qr-modal { transform: scale(1); }
  .qr-modal h3 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--fg);
  }
  .qr-modal p {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .qr-img-wrap {
    background: #fff;
    border-radius: 10px;
    padding: 12px;
    display: inline-block;
    margin-bottom: 16px;
  }
  .qr-img-wrap img { display: block; width: 180px; height: 180px; }
  .qr-link-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .qr-link-input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    color: var(--fg);
    font-size: 11px;
    font-family: monospace;
    outline: none;
    min-width: 0;
  }
  .qr-copy-btn {
    padding: 8px 12px;
    border: 1px solid var(--accent);
    border-radius: 8px;
    background: transparent;
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s ease;
  }
  .qr-copy-btn:active { transform: scale(0.96); }
  .qr-close-btn {
    margin-top: 14px;
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .qr-close-btn:hover { border-color: var(--fg); color: var(--fg); }

  /* Section */
  .section {
    margin-bottom: 12px;
    animation: fadeUp 0.5s ease both;
  }
  .section:nth-child(2) { animation-delay: 0.1s; }
  .section:nth-child(3) { animation-delay: 0.2s; }
  .section:nth-child(4) { animation-delay: 0.3s; }

  .section-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
    padding-left: 2px;
  }

  /* Scenario Grid */
  .scenario-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .scenario-card {
    background: linear-gradient(145deg, rgba(50,40,90,0.35) 0%, rgba(30,25,60,0.25) 100%);
    border: 1px solid rgba(140,120,200,0.2);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 10px;
    padding: 7px 4px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
    user-select: none;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    min-height: 50px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 2px 8px rgba(0,0,0,0.3);
  }

  .scenario-card::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    transition: left 0.5s ease;
  }

  .scenario-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }

  .scenario-card:active { transform: scale(0.96); }

  .scenario-card:hover {
    border-color: rgba(232,168,56,0.4);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 2px 12px rgba(232,168,56,0.08);
  }
  .scenario-card:hover::before { left: 100%; }

  .scenario-card.selected {
    border-color: var(--accent);
    background: linear-gradient(145deg, var(--accent-dim) 0%, rgba(232,168,56,0.04) 100%);
    box-shadow: inset 0 0 12px rgba(232,168,56,0.08), 0 0 16px rgba(232,168,56,0.12);
  }
  .scenario-card.selected::before { left: 100%; }
  .scenario-card.selected::after { opacity: 0.02; }

  .scenario-card .emoji {
    font-size: 18px;
    display: block;
    filter: drop-shadow(0 0 4px rgba(232,168,56,0.2));
  }

  .scenario-card .name {
    font-size: 12px;
    font-weight: 600;
    color: var(--fg);
    position: relative;
    z-index: 1;
    line-height: 1.2;
    letter-spacing: 0.3px;
  }

  /* Tone Selector */
  .tone-row {
    display: flex;
    gap: 10px;
  }

  .tone-btn {
    flex: 1;
    padding: 8px 6px;
    border-radius: 10px;
    border: 1px solid rgba(140,120,200,0.2);
    background: linear-gradient(145deg, rgba(50,40,90,0.35) 0%, rgba(30,25,60,0.25) 100%);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    cursor: pointer;
    text-align: center;
    transition: all 0.25s ease;
    user-select: none;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 2px 8px rgba(0,0,0,0.3);
  }

  .tone-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, currentColor, transparent);
    transition: left 0.5s ease;
    opacity: 0.5;
  }

  .tone-btn:active { transform: scale(0.96); }

  .tone-btn:hover {
    border-color: rgba(255,255,255,0.15);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 2px 12px rgba(0,0,0,0.4);
  }
  .tone-btn:hover::before { left: 100%; }

  .tone-btn .tone-name {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 2px;
    letter-spacing: 0.5px;
  }

  .tone-btn .tone-desc {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.3px;
  }

  .tone-btn[data-tone="sincere"].selected {
    border-color: var(--sincere);
    background: linear-gradient(145deg, var(--sincere-dim) 0%, rgba(74,158,125,0.04) 100%);
    box-shadow: inset 0 0 12px rgba(74,158,125,0.1), 0 0 16px rgba(74,158,125,0.12);
  }
  .tone-btn[data-tone="sincere"].selected::before { left: 100%; }
  .tone-btn[data-tone="sincere"].selected .tone-name { color: var(--sincere); }

  .tone-btn[data-tone="ridiculous"].selected {
    border-color: var(--ridiculous);
    background: linear-gradient(145deg, var(--ridiculous-dim) 0%, rgba(212,93,93,0.04) 100%);
    box-shadow: inset 0 0 12px rgba(212,93,93,0.1), 0 0 16px rgba(212,93,93,0.12);
  }
  .tone-btn[data-tone="ridiculous"].selected::before { left: 100%; }
  .tone-btn[data-tone="ridiculous"].selected .tone-name { color: var(--ridiculous); }

  .tone-btn[data-tone="perfunctory"].selected {
    border-color: var(--perfunctory);
    background: linear-gradient(145deg, var(--perfunctory-dim) 0%, rgba(122,122,176,0.04) 100%);
    box-shadow: inset 0 0 12px rgba(122,122,176,0.1), 0 0 16px rgba(122,122,176,0.12);
  }
  .tone-btn[data-tone="perfunctory"].selected::before { left: 100%; }
  .tone-btn[data-tone="perfunctory"].selected .tone-name { color: var(--perfunctory); }

  .tone-btn[data-tone="high_eq"].selected {
    border-color: var(--high-eq);
    background: linear-gradient(145deg, var(--high-eq-dim) 0%, rgba(56,178,172,0.04) 100%);
    box-shadow: inset 0 0 12px rgba(56,178,172,0.15), 0 0 20px rgba(56,178,172,0.15);
  }
  .tone-btn[data-tone="high_eq"].selected::before { left: 100%; }
  .tone-btn[data-tone="high_eq"].selected .tone-name { color: var(--high-eq); }

  /* Generate Button */
  .gen-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: var(--radius);
    background: linear-gradient(135deg, var(--accent), #d4922e);
    color: #0f0f0f;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
  }

  .gen-btn:active { transform: scale(0.98); }
  .gen-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .gen-btn .shimmer {
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: shimmer 2s infinite;
  }

  /* Result */
  .result-area {
    margin-top: 12px;
    animation: fadeUp 0.4s ease;
  }

  .result-box {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    position: relative;
    min-height: 50px;
  }

  .result-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--fg);
    font-weight: 400;
    white-space: pre-wrap;
  }

  .copy-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    border: 1.5px solid var(--accent);
    border-radius: var(--radius);
    background: transparent;
    color: var(--accent);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .copy-btn:active { transform: scale(0.98); }
  .copy-btn.copied {
    border-color: var(--sincere);
    color: var(--sincere);
    background: var(--sincere-dim);
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes shimmer {
    0% { left: -100%; }
    100% { left: 100%; }
  }
  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.9) translateY(10px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes nebulaDrift {
    0% { transform: translate(0, 0) scale(1); opacity: 0.8; }
    50% { transform: translate(-15px, 10px) scale(1.05); opacity: 1; }
    100% { transform: translate(10px, -15px) scale(0.98); opacity: 0.9; }
  }

  @keyframes galaxyFlow {
    0% { transform: translate(0, 0) rotate(0deg); opacity: 0.7; }
    50% { transform: translate(-20px, 15px) rotate(2deg); opacity: 1; }
    100% { transform: translate(15px, -20px) rotate(-1deg); opacity: 0.85; }
  }

  @keyframes orbFloat1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(30px, -40px) scale(1.1); }
    50% { transform: translate(-20px, -60px) scale(0.95); }
    75% { transform: translate(-40px, -20px) scale(1.05); }
  }

  @keyframes orbFloat2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(-40px, 30px) scale(1.08); }
    50% { transform: translate(20px, 50px) scale(0.92); }
    75% { transform: translate(50px, 10px) scale(1.04); }
  }

  @keyframes orbFloat3 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(40px, 20px) scale(1.12); }
    66% { transform: translate(-30px, -30px) scale(0.9); }
  }

  .bg-orb {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    filter: blur(80px);
  }

  .bg-orb-1 {
    top: 10%; left: 5%;
    width: 200px; height: 200px;
    background: rgba(232,168,56,0.2);
    animation: orbFloat1 12s ease-in-out infinite;
  }

  .bg-orb-2 {
    bottom: 15%; right: 5%;
    width: 180px; height: 180px;
    background: rgba(212,93,93,0.18);
    animation: orbFloat2 15s ease-in-out infinite;
  }

  .bg-orb-3 {
    top: 50%; left: 50%;
    width: 150px; height: 150px;
    background: rgba(122,122,176,0.15);
    animation: orbFloat3 18s ease-in-out infinite;
  }

  .result-area.show { animation: popIn 0.35s ease; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 100;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Noise overlay */
  .noise {
    position: fixed;
    inset: 0;
    opacity: 0.04;
    pointer-events: none;
    z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
  }
</style>
</head>
<body>

<div class="noise"></div>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>
<div class="container">
  <div class="header">
    <div class="logo">溜了</div>
    <div class="sub">完美借口生成器</div>
    <div class="version-toggle" id="versionToggle">
      <button class="version-btn active" data-version="normal">普通版</button>
      <button class="version-btn" data-version="teacher">教师专版</button>
    </div>
    <button class="share-btn" id="shareBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      分享给朋友
    </button>
  </div>

  <div class="section">
    <div class="section-label">选场景</div>
    <div class="scenario-grid" id="scenarioGrid"></div>
  </div>

  <div class="section">
    <div class="section-label">选语气</div>
    <div class="tone-row" id="toneRow">
      <div class="tone-btn" data-tone="sincere">
        <div class="tone-name">诚恳</div>
        <div class="tone-desc">情真意切</div>
      </div>
      <div class="tone-btn" data-tone="ridiculous">
        <div class="tone-name">离谱</div>
        <div class="tone-desc">离谱但合理</div>
      </div>
      <div class="tone-btn" data-tone="perfunctory">
        <div class="tone-name">敷衍</div>
        <div class="tone-desc">随便编一个</div>
      </div>
    </div>
  </div>

  <div class="section">
    <button class="gen-btn" id="genBtn" disabled>
      <span class="shimmer"></span>
      <span id="genBtnText">生成借口</span>
    </button>
  </div>

  <div class="result-area" id="resultArea" style="display:none">
    <div class="result-box">
      <div class="result-text" id="resultText"></div>
    </div>
    <button class="copy-btn" id="copyBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      复制借口
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="qr-overlay" id="qrOverlay">
  <div class="qr-modal">
    <h3>扫一扫，溜了</h3>

function getScenarios() { return currentVersion === 'normal' ? NORMAL_SCENARIOS : TEACHER_SCENARIOS; }
function getTones() { return currentVersion === 'normal' ? NORMAL_TONES : TEACHER_TONES; }
function getExcuses() { return currentVersion === 'normal' ? EXCUSES : TEACHER_EXCUSES; }

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getShuffledPool(key) {
  if (!shuffledPools[key] || shuffledPools[key].length === 0) {
    const [version, scenario, tone] = key.split('|');
    const excuses = version === 'normal' ? EXCUSES : TEACHER_EXCUSES;
    const pool = excuses[scenario][tone];
    shuffledPools[key] = shuffleArray(pool.map((_, i) => i));
  }
  return shuffledPools[key];
}

document.getElementById('versionToggle').addEventListener('click', (e) => {
  const btn = e.target.closest('.version-btn');
  if (!btn) return;
  const v = btn.dataset.version;
  if (v === currentVersion) return;
  currentVersion = v;
  document.querySelectorAll('.version-btn').forEach(b => b.classList.toggle('active', b.dataset.version === v));
  document.getElementById('genBtnText').textContent = v === 'normal' ? '生成借口' : '生成回复';
  renderScenarios();
  renderTones();
  setDefaults(v);
  document.getElementById('resultArea').style.display = 'none';
});

function setDefaults(v) {
  const scenarios = v === 'normal' ? NORMAL_SCENARIOS : TEACHER_SCENARIOS;
  const defaultTone = v === 'normal' ? 'ridiculous' : 'high_eq';
  selectedScenario = scenarios[0].id;
  selectedTone = defaultTone;
  const scenarioCard = document.querySelector('.scenario-card[data-id="' + selectedScenario + '"]');
  if (scenarioCard) scenarioCard.classList.add('selected');
  const toneBtn = document.querySelector('.tone-btn[data-tone="' + selectedTone + '"]');
  if (toneBtn) toneBtn.classList.add('selected');
  checkReady();
}

const grid = document.getElementById('scenarioGrid');
function renderScenarios() {
  grid.innerHTML = '';
  getScenarios().forEach(s => {
    const card = document.createElement('div');
    card.className = 'scenario-card';
    card.dataset.id = s.id;
    card.innerHTML = '<span class="emoji">' + s.emoji + '</span><span class="name">' + s.name + '</span>';
    card.addEventListener('click', () => {
      document.querySelectorAll('.scenario-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedScenario = s.id;
      checkReady();
    });
    grid.appendChild(card);
  });
}

const toneRow = document.getElementById('toneRow');
function renderTones() {
  toneRow.innerHTML = '';
  getTones().forEach(t => {
    const btn = document.createElement('div');
    btn.className = 'tone-btn';
    btn.dataset.tone = t.id;
    btn.innerHTML = '<div class="tone-name">' + t.name + '</div><div class="tone-desc">' + t.desc + '</div>';
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedTone = t.id;
      checkReady();
    });
    toneRow.appendChild(btn);
  });
}

document.getElementById('genBtn').addEventListener('click', () => {
  if (!selectedScenario || !selectedTone) return;
  const key = currentVersion + '|' + selectedScenario + '|' + selectedTone;
  const pool = getExcuses()[selectedScenario][selectedTone];
  const shuffled = getShuffledPool(key);
  const idx = shuffled.shift();
  const excuse = pool[idx];
  const area = document.getElementById('resultArea');
  const text = document.getElementById('resultText');
  text.textContent = excuse;
  area.style.display = 'block';
  area.classList.remove('show');
  void area.offsetWidth;
  area.classList.add('show');
  const copyBtn = document.getElementById('copyBtn');
  copyBtn.classList.remove('copied');
  const copyText = currentVersion === 'normal' ? '复制借口' : '复制回复';
  copyBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> ' + copyText;
});

renderScenarios();
renderTones();
setDefaults('normal');

function checkReady() {
  document.getElementById('genBtn').disabled = !(selectedScenario && selectedTone);
}

document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('resultText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> 已复制';
    showToast('已复制到剪贴板');
    setTimeout(() => {
      btn.classList.remove('copied');
      const copyText = currentVersion === 'normal' ? '复制借口' : '复制回复';
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> ' + copyText;
    }, 2000);
  });
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

const qrOverlay = document.getElementById('qrOverlay');
const qrImg = document.getElementById('qrImg');
const qrLinkInput = document.getElementById('qrLinkInput');

document.getElementById('shareBtn').addEventListener('click', () => {
  const url = window.location.href;
  qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(url);
  qrLinkInput.value = url;
  qrOverlay.classList.add('show');
});
document.getElementById('qrCloseBtn').addEventListener('click', () => {
  qrOverlay.classList.remove('show');
});
qrOverlay.addEventListener('click', (e) => {
  if (e.target === qrOverlay) qrOverlay.classList.remove('show');
});
document.getElementById('qrCopyBtn').addEventListener('click', () => {
  qrLinkInput.select();
  document.execCommand('copy');
  showToast('链接已复制');
});
</script>
</body>
